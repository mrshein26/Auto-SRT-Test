- name: Install System Dependencies (Tesseract & FFmpeg)
        run: |
          sudo apt update 
          sudo apt install -y ffmpeg tesseract-ocr tesseract-ocr-mya libgl1-mesa-glx

      - name: Install Python Libraries (OpenCV, Pytesseract, YT-DLP)
        run: pip install opencv-python pytesseract yt-dlp

      - name: Download Video from URL (YT-DLP)
        run: yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/mp4" -o "video.mp4" "${{ github.event.inputs.video_url }}"

      - name: Extract Myanmar Subtitles (OCR)
        run: python ocr_extract.py

      - name: Send Email with SRT File
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ github.event.inputs.recipient_email }}
        run: python send_email.py
