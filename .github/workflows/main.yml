name: Subtitle Auto Generator (OCR to SRT)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Video Link (URL) ထည့်ပါ'
        required: true
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies (Tesseract & FFmpeg)
        run: |
          sudo apt update 
          sudo apt install -y ffmpeg tesseract-ocr tesseract-ocr-mya libgl1-mesa-glx

      - name: Install Python Libraries (OpenCV, Pytesseract, YT-DLP)
        run: pip install opencv-python pytesseract yt-dlp

      - name: Download Video from URL (YT-DLP)
        run: yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/mp4" -o "video.mp4" "${{ github.event.inputs.video_url }}"

      - name: Extract Myanmar Subtitles (OCR)
        run: python ocr_extract.py

      # ရရှိလာသော SRT ဖိုင်ကို GitHub တွင် Download ဆွဲနိုင်ရန် တင်ပေးခြင်း
      - name: Upload SRT as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Myanmar_Subtitle_SRT
          path: audio.srt
