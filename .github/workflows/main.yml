name: Subtitle Auto Generator (Test)

# WebUI သို့မဟုတ် အပြင်ကနေ Manual Run လို့ရအောင် workflow_dispatch ကို သုံးပါတယ်
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Video Link (URL) ထည့်ပါ'
        required: true
        default: 'https://example.com/test_video.mp4'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Test Python Script
        run: |
          echo "ဒေါင်းလုဒ်ဆွဲမည့် လင့်ခ် - ${{ github.event.inputs.video_url }}"
          python -c "
          import time
          print('Hello! စနစ် စတင်နေပါပြီ...')
          time.sleep(2)
          print('ဗီဒီယိုကို စစ်ဆေးနေပါသည်...')
          time.sleep(2)
          print('ပြီးပါပြီ! ဤနေရာတွင် SRT ထုတ်မည့် Code များ ဆက်လက်ထည့်သွင်းရပါမည်။')
          "
